<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">PANEL HOSPITALIZACION</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.dataTables.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined">
    <link rel="stylesheet" th:href="@{/css/paneles/panel_hospi.css}">
</head>
<body>
<nav class="navbar navbar-dark px-3">
    <span class="navbar-brand mb-0 h1" th:text="${titulo}">PANEL HOSPITALIZACION</span>
    <div class="d-flex align-items-center gap-3">
        <span class="nav-link" th:text="${fecha}">27/05/2026</span>
        <button class="nav-link btn btn-link p-0" type="button" data-bs-toggle="offcanvas" data-bs-target="#parametros" aria-controls="parametros" title="Parametros">
            <i class="material-symbols-outlined">manage_search</i>
        </button>
    </div>
</nav>

<main class="container-fluid py-3">
    <div class="row">
        <div class="col-12">
            <h4 id="titulo-panel" class="text-center" th:text="${titulo}">PANEL HOSPITALIZACION</h4>
        </div>

        <div class="col-12">
            <table id="tabla-unidad" class="table table-striped table-bordered w-100">
                <thead>
                <tr>
                    <th>FECHA IN.</th>
                    <th>ATE.</th>
                    <th>HAB.</th>
                    <th>HCL</th>
                    <th>EXI</th>
                    <th>EXL</th>
                    <th>CARD.</th>
                    <th>FISIO.</th>
                    <th>INTER.</th>
                    <th>CIR.</th>
                    <th>PREALTA</th>
                    <th>ENFER.</th>
                </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <table>
        <tr>
            <td class="amarillo"></td>
            <td>&nbsp;&nbsp;INGRESO&nbsp;</td>
            <td class="rojo"></td>
            <td>&nbsp;&nbsp;ALTA MEDICA&nbsp;</td>
        </tr>
    </table>
</main>

<div class="offcanvas offcanvas-end" tabindex="-1" id="parametros" aria-labelledby="parametrosLabel">
    <div class="offcanvas-header">
        <h5 class="offcanvas-title" id="parametrosLabel">Parametros</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Cerrar"></button>
    </div>
    <div class="offcanvas-body">
        <div class="row">
            <div class="col-12">
                <label class="form-label parametro" for="sector">Sector:</label>
                <select name="sector" id="sector" class="form-control" onchange="cargarTabla();">
                    <option value="" selected disabled>-- SELECCIONE UN SECTOR --</option>
                    <option th:each="unidad : ${unidades}"
                            th:value="${unidad.cd}"
                            th:text="${unidad.ds}">
                    </option>
                    <option value="40">HOSPITALIZACION (TERCER PISO ATRAS)</option>
                </select>
                <br>
                <label class="form-label parametro" for="pantalla">Pantalla:</label><br>
                <button class="btn btn-danger d-flex align-items-center" onclick="toggleFullScreen()">
                    <i class="material-symbols-outlined">screenshot_monitor</i>
                    <span id="pantalla">&nbsp; PANTALLA COMPLETA</span>
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>
<script th:src="@{/js/paneles/panel-hospi.js}"></script>
</body>
</html>
